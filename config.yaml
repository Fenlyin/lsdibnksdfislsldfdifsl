mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
clash-for-android:
  append-system-dns: false
experimental:
  sniff-tls-sni: true
unified-delay: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
dns:
  enable: true
  ipv6: false
  listen: "0.0.0.0:1053"
  use-hosts: true
  default-nameserver: [119.29.29.29, 223.5.5.5, 180.184.1.1]
  nameserver:
    [
      119.28.28.28,
      223.6.6.6,
      "https://1.12.12.12/dns-query",
      "https://dns.alidns.com/dns-query",
      "tls://223.6.6.6:853",
    ]
  fake-ip-range: 198.18.0.1/16

proxy-providers:
