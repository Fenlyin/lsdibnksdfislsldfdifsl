used_proxies: &used_proxies [liangxinyun, spirit]

proxies:
  - {
      name: "MyProxy",
      type: trojan,
      server: 127.0.0.1,
      port: 33201,
      password: 7e4d36d6-d1c4-4ba0-9c8c-f38ab389b991,
      udp: true,
      sni: music.mcdn.bilivideo.cn,
      skip-cert-verify: true,
    }

proxy-groups:
  # ============ 各 Provider 单独组 (hidden) ============
  # --- liangxinyun ---
  - name: "🇯🇵 JP-liangxinyun"
    type: url-test
    use: [liangxinyun]
    filter: "(?i)日本|JP"
    url: "http://www.google.co.jp/generate_204"
    interval: 300
    hidden: true

  - name: "🇺🇸 US-liangxinyun"
    type: url-test
    use: [liangxinyun]
    filter: "(?i)美国|US"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  - name: "Asia-liangxinyun"
    type: url-test
    use: [liangxinyun]
    filter: "(?i)香港|HK|台湾|TW"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  # --- spirit ---
  - name: "🇯🇵 JP-spirit"
    type: url-test
    use: [spirit]
    filter: "(?i)日本|JP"
    url: "http://www.google.co.jp/generate_204"
    interval: 300
    hidden: true

  - name: "🇺🇸 US-spirit"
    type: url-test
    use: [spirit]
    filter: "(?i)美国|US"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  - name: "Asia-spirit"
    type: url-test
    use: [spirit]
    filter: "(?i)香港|HK|台湾|TW"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  # ============ 外层 Fallback 嵌套组 ============
  - name: "🇯🇵 JP"
    type: fallback
    proxies:
      - "🇯🇵 JP-liangxinyun"
      - "🇯🇵 JP-spirit"

  - name: "🇺🇸 US"
    type: fallback
    proxies:
      - "🇺🇸 US-liangxinyun"
      - "🇺🇸 US-spirit"

  - name: "Asia"
    type: fallback
    proxies:
      - "Asia-liangxinyun"
      - "Asia-spirit"

  # ============ 其他组 ============
  - name: "Direct"
    type: select
    use: *used_proxies
    proxies: [DIRECT]
    url: "http://detectportal.firefox.com/success.txt"

  - name: "AI-Proxy"
    type: select
    use: [spirit]
    url: "http://www.google.com/generate_204"

  # ============ 干净 IP 组 ============
  - name: "CleanIP"
    type: fallback
    proxies:
      - "🇺🇸 US-liangxinyun"
      - "🇺🇸 US-spirit"
    hidden: true

rules:
  # ============ 管理界面直连 ============
  - DOMAIN,clash.razord.top,Direct
  - DOMAIN,yacd.haishan.me,Direct

  # ============ 干净 IP 专用 (支付/银行/Gmail 等) ============
  - DOMAIN-SUFFIX,paypal.com,CleanIP
  - DOMAIN-SUFFIX,paypalobjects.com,CleanIP
  - DOMAIN-KEYWORD,bank,CleanIP
  - DOMAIN-SUFFIX,gmail.com,CleanIP
  - DOMAIN-SUFFIX,googlemail.com,CleanIP

  # ============ AI 服务 ============
  # ChatGPT
  - DOMAIN-SUFFIX,chatgpt.com,AI-Proxy
  - DOMAIN-SUFFIX,openai.com,AI-Proxy
  - DOMAIN-SUFFIX,auth0.com,AI-Proxy
  - DOMAIN,client-api.arkoselabs.com,AI-Proxy
  # Gemini / Google AI
  - DOMAIN-SUFFIX,gemini.google.com,AI-Proxy
  - DOMAIN-SUFFIX,geminiapi.googleapis.com,AI-Proxy
  - DOMAIN-SUFFIX,googleapis.com,AI-Proxy
  - DOMAIN-SUFFIX,proactivebackend-pa.googleapis.com,AI-Proxy
  - DOMAIN,aistudio.google.com,AI-Proxy
  - DOMAIN,alkalimakersuite-pa.clients6.google.com,AI-Proxy
  - DOMAIN,generativelanguage.googleapis.com,AI-Proxy
  # Claude
  - DOMAIN-SUFFIX,claude.ai,AI-Proxy
  - DOMAIN-SUFFIX,api.anthropic.com,AI-Proxy
  # Google Scholar
  - DOMAIN,scholar.google.com,AI-Proxy

  # ============ 流媒体/视频 ============
  - DOMAIN-KEYWORD,youtube,🇺🇸 US

  # ============ 开发/技术 ============
  - DOMAIN-KEYWORD,github,Asia
  - DOMAIN,play.vuejs.org,Asia
  - DOMAIN,repo.maven.apache.org,Asia
  - DOMAIN-KEYWORD,clashverge,Asia
  - DOMAIN-KEYWORD,metacubex,Asia

  # ============ 游戏 ============
  - DOMAIN-KEYWORD,gamebanana,Asia
  - DOMAIN-KEYWORD,rwth-aachen,🇺🇸 US

  # ============ 邮件 ============
  - DOMAIN-SUFFIX,mail.com,Asia

  # ============ 进程规则 ============
  - PROCESS-NAME,nvim.exe,Asia
  - PROCESS-NAME,Proxifier.exe,Asia

  # ============ 国内服务直连 ============
  - DOMAIN-SUFFIX,microsoft.com,Direct
  - DOMAIN-SUFFIX,alibabacloud,DIRECT
  - DOMAIN-KEYWORD,account-cn,DIRECT
  # AGE 动漫
  - DOMAIN,www.agedm.org,DIRECT
  - DOMAIN,*.age.tv,DIRECT
  - DOMAIN,*.agefans.com,DIRECT
  - DOMAIN,*.agedm.mys,DIRECT

  # ============ 规则集 ============
  - RULE-SET,applications,Direct
  - RULE-SET,private,Direct
  - RULE-SET,reject,REJECT
  - RULE-SET,icloud,Asia
  - RULE-SET,apple,Asia
  - RULE-SET,google,🇺🇸 US
  - RULE-SET,proxy,Asia
  - RULE-SET,direct,Direct
  - RULE-SET,lancidr,Direct
  - RULE-SET,cncidr,Direct
  - RULE-SET,telegramcidr,Asia

  # ============ 兜底 ============
  - GEOIP,LAN,Direct
  - MATCH,🇺🇸 US

