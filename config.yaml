mixed-port: 7897
allow-lan: true
mode: rule
ipv6: false
log-level: info
clash-for-android:
  append-system-dns: false
experimental:
  sniff-tls-sni: true
unified-delay: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
dns:
  enable: true
  ipv6: false
  listen: "0.0.0.0:1053"
  use-hosts: true
  default-nameserver: [119.29.29.29, 223.5.5.5, 180.184.1.1]
  nameserver:
    [
      119.28.28.28,
      223.6.6.6,
      "https://1.12.12.12/dns-query",
      "https://dns.alidns.com/dns-query",
      "tls://223.6.6.6:853",
    ]
  fake-ip-range: 198.18.0.1/16
tun:
  enable: true
  stack: mixed
  device: utun-clash
  dns-hijack:
    - 0.0.0.0:53
    - tcp://0.0.0.0:53
  auto-route: true
  auto-detect-interface: true

proxy-providers:
  spirit:
    type: http
    url: https://subscription.riolu.link/RioLU/system/api/v1/client/subscribe?token=313d2af8a5f2a0a834aac4f1b313535f
    path: ./profiles/spirit.yml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

  liangxinyun:
    type: http
    url: https://liangxin.xyz/api/v1/liangxin?OwO=943953640ffd5f35d26c4a763a5a5fc8
    path: ./profiles/liangxinyun.yml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
    override:
      additional-prefix: "[liangxinyun]"

used_proxies: &used_proxies [liangxinyun, spirit]

proxy-groups:
  # ============ 各 Provider 单独组 (hidden) ============
  # --- liangxinyun ---
  - name: "🇯🇵 JP-liangxinyun"
    type: url-test
    use: [liangxinyun]
    filter: "(?i)日本|JP"
    url: "https://www.google.co.jp/generate_204"
    interval: 300
    hidden: true

  - name: "🇺🇸 US-liangxinyun"
    type: url-test
    use: [liangxinyun]
    filter: "(?i)美国|US"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  - name: "Asia-liangxinyun"
    type: url-test
    use: [liangxinyun]
    filter: "(?i)香港|HK|台湾|TW"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  # --- spirit ---
  - name: "🇯🇵 JP-spirit"
    type: url-test
    use: [spirit]
    filter: "(?i)日本|JP"
    url: "https://www.google.co.jp/generate_204"
    interval: 300
    hidden: true

  - name: "🇺🇸 US-spirit"
    type: url-test
    use: [spirit]
    filter: "(?i)美国|US"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  - name: "Asia-spirit"
    type: url-test
    use: [spirit]
    filter: "(?i)香港|HK|台湾|TW"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    hidden: true

  # ============ 外层 Fallback 嵌套组 ============
  - name: "🇯🇵 JP"
    type: fallback
    proxies:
      - "🇯🇵 JP-liangxinyun"
      - "🇯🇵 JP-spirit"

  - name: "🇺🇸 US"
    type: fallback
    proxies:
      - "🇺🇸 US-liangxinyun"
      - "🇺🇸 US-spirit"

  - name: "Asia"
    type: fallback
    proxies:
      - "Asia-liangxinyun"
      - "Asia-spirit"

  # ============ 其他组 ============
  - name: "Direct"
    type: select
    use: *used_proxies
    proxies: [DIRECT]
    url: "https://detectportal.firefox.com/success.txt"

  # ============ 干净 IP 组 ============
  - name: "CleanIP"
    type: select
    use: [spirit]
    url: "https://www.google.com/generate_204"

rules:
  - DOMAIN-KEYWORD, 44mmd, Direct
  - DOMAIN, pv.sohu.com, DIRECT
  # ============ 管理界面直连 ============
  - DOMAIN,clash.razord.top,Direct
  - DOMAIN,yacd.haishan.me,Direct

  # ============ 干净 IP 专用 ============
  - DOMAIN-SUFFIX,paypal.com, CleanIP
  - DOMAIN-SUFFIX,paypalobjects.com, CleanIP
  - DOMAIN-KEYWORD,bank, CleanIP
  - DOMAIN-SUFFIX,gmail.com, CleanIP
  - DOMAIN-SUFFIX,googlemail.com, CleanIP
  - DOMAIN, ping0.cc, CleanIP

  # ============ AI 服务 ============
  # ChatGPT
  - DOMAIN-SUFFIX,chatgpt.com, CleanIP
  - DOMAIN-SUFFIX,openai.com, CleanIP
  - DOMAIN-SUFFIX,auth0.com, CleanIP
  - DOMAIN,client-api.arkoselabs.com, CleanIP
  # Gemini / Google AI
  - DOMAIN-SUFFIX,gemini.google.com, CleanIP
  - DOMAIN-SUFFIX,geminiapi.googleapis.com, CleanIP
  - DOMAIN-SUFFIX,googleapis.com, CleanIP
  - DOMAIN-SUFFIX,proactivebackend-pa.googleapis.com, CleanIP
  - DOMAIN,aistudio.google.com, CleanIP
  - DOMAIN,alkalimakersuite-pa.clients6.google.com, CleanIP
  - DOMAIN,generativelanguage.googleapis.com, CleanIP
  # Claude
  - DOMAIN-SUFFIX,claude.ai, CleanIP
  - DOMAIN-SUFFIX,anthropic.com, CleanIP
  # Google Scholar
  - DOMAIN,scholar.google.com, CleanIP

  - DOMAIN, opencode.ai, Asia

  # ============ 流媒体/视频 ============
  - DOMAIN-KEYWORD,youtube,🇺🇸 US

  # ============ 开发/技术 ============
  - DOMAIN-KEYWORD,github,Asia
  - DOMAIN,play.vuejs.org,Asia
  - DOMAIN,repo.maven.apache.org,Asia
  - DOMAIN-KEYWORD,clashverge,Asia
  - DOMAIN-KEYWORD,metacubex,Asia
  - DOMAIN-KEYWORD,pytorch,Asia

  # ============ 游戏 ============
  - DOMAIN-KEYWORD,gamebanana,Asia
  - DOMAIN-KEYWORD,rwth-aachen,🇺🇸 US

  # ============ 国内服务直连 ============
  - DOMAIN-SUFFIX,microsoft.com,Direct
  - DOMAIN-SUFFIX,alibabacloud,DIRECT
  - DOMAIN-KEYWORD,account-cn,DIRECT

  # ============ 规则集 ============
  - RULE-SET,private,Direct
  - RULE-SET,reject,REJECT
  - RULE-SET,icloud,Asia
  - RULE-SET,apple,Asia
  - RULE-SET,google,🇺🇸 US
  - RULE-SET,proxy,Asia
  - RULE-SET,direct,Direct
  - RULE-SET,lancidr,Direct
  - RULE-SET,cncidr,Direct
  - RULE-SET,telegramcidr,Asia
  - RULE-SET,applications,Direct

  # ============ 兜底 ============
  - GEOIP,LAN,Direct
  - MATCH,🇺🇸 US

