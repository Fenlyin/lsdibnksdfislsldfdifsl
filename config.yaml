    url: http://gw-lepriiky01.fj520.click/api/v1/client/subscribe?token=69a88044268abe17b08c44097a624d7b
    path: ./profiles/flywhaler.yml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

  spirit:
    type: http
    url: https://subscription.riolu.link/RioLU/system/api/v1/client/subscribe?token=313d2af8a5f2a0a834aac4f1b313535f
    path: ./profiles/spirit.yml
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

  liangxinyun:
    type: http
